<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HUA 3D Campus Presentation</title>
    <link rel="shortcut icon" href="./favicon-32.png" type="image/png" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta
      name="description"
      content="Landing page inspired by hua.gr with a full-screen interactive GLB campus hero."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <header class="site-header" id="siteHeader">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-text">
          <strong>Harokopio University</strong>
          <small>3D Campus Presentation</small>
        </span>
      </div>
    </header>

    <div class="header-actions">
      <button class="header-button icon-button" id="qualityToggle" type="button" aria-pressed="false" aria-label="HD" title="HD">
        <span class="control-icon control-icon--hd" aria-hidden="true">HD</span>
      </button>
      <button class="header-button icon-button" id="fullscreenToggle" type="button" aria-label="Fullscreen" title="Fullscreen">
        <span class="control-icon control-icon--fullscreen" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 3.5H3.5V7"></path>
            <path d="M13 3.5h3.5V7"></path>
            <path d="M7 16.5H3.5V13"></path>
            <path d="M13 16.5h3.5V13"></path>
          </svg>
        </span>
      </button>
    </div>

    <main id="top">
      <section class="hero" aria-labelledby="heroTitle">
        <div class="hero-media">
          <model-viewer
            id="siteModel"
            src="./HuaDayBest1_web.glb"
            alt="3D model of the campus"
            camera-controls
            auto-rotate
            auto-rotate-delay="0"
            rotation-per-second="-10deg"
            touch-action="none"
            orientation="180deg 90deg 0deg"
            camera-target="0m 6m 0m"
            camera-orbit="180deg 75deg auto"
            min-camera-orbit="auto 55deg auto"
            max-camera-orbit="auto 85deg auto"
            field-of-view="24deg"
            min-field-of-view="5deg"
            max-field-of-view="40deg"
            interpolation-decay="140"
            interaction-prompt="none"
            environment-image="neutral"
            exposure="1.35"
            shadow-intensity="0.9"
            tone-mapping="commerce"
            loading="eager"
          ></model-viewer>

          <div class="hero-gradient"></div>
          <div class="hero-noise"></div>
        </div>

        <div class="hero-time-control">
          <button
            class="time-dial"
            id="timeDial"
            type="button"
            aria-label="Change time of day"
            data-stage="day"
          >
            <span class="time-dial-shell"></span>
            <span class="time-dial-track"></span>
            <span class="time-dial-core"></span>
            <span class="time-orbit">
              <span class="time-body time-sun"></span>
              <span class="time-body time-moon"></span>
            </span>
          </button>

          <div class="time-readout">
            <span class="time-label">Time</span>
            <div class="time-stage-markers">
              <button class="time-stage-marker" data-stage="day" type="button">Day</button>
              <button class="time-stage-marker" data-stage="dusk" type="button">Dusk</button>
              <button class="time-stage-marker" data-stage="night" type="button">Night</button>
            </div>
          </div>
        </div>

        <div class="hero-overlay">
          <div class="hero-button-row">
            <button class="secondary-link icon-button" id="resetCamera" type="button" aria-label="Reset" title="Reset">
              <span class="control-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.2 16.9A7.8 7.8 0 1 1 15.4 4.9" />
                  <path d="M15.4 7L18.9 5.35" />
                  <path d="M15.4 4.9L16.95 2.25" />
                </svg>
              </span>
            </button>
            <button class="chip icon-button" id="turntableToggle" type="button" aria-pressed="true" aria-label="Rotate" title="Rotate">
              <span class="control-icon control-icon--rotate360" aria-hidden="true">
                <svg viewBox="0 0 28 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <text x="10.5" y="8.2" text-anchor="middle" font-size="9" font-weight="700" fill="currentColor" stroke="none">360</text>
                  <path d="M5.2 13.6a8.9 8.9 0 0 0 8.3 4.1c3.8 0 7.2-1.8 9.4-4.8"></path>
                  <path d="M23 8h5v4"></path>
                </svg>
              </span>
            </button>
            <button class="chip icon-button" id="materialToggle" type="button" aria-pressed="false" aria-label="Clay View" title="Clay View">
              <span class="control-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  <ellipse cx="10" cy="6" rx="4.5" ry="2.3"></ellipse>
                  <path d="M5.5 6v4c0 1.3 2 2.3 4.5 2.3s4.5-1 4.5-2.3V6"></path>
                  <path d="M5.5 10v4c0 1.3 2 2.3 4.5 2.3s4.5-1 4.5-2.3v-4"></path>
                </svg>
              </span>
            </button>
          </div>

          <div class="hero-status" id="viewerStatus">
            <span class="status-label" id="statusPill">Loading model</span>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="statusCopy">
              Preparing the 3D viewer and connecting the Draco-compressed GLB.
            </p>
          </div>
        </div>

      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
